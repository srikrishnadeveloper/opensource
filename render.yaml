# Wiki Brain — one-click Render deploy
#
# User steps:
#   1. Fork this repo on GitHub
#   2. Render Dashboard → New → Blueprint → connect your fork
#   3. (Optional) Paste GITHUB_TOKEN for wiki write tools
#   4. Open Render → Logs → copy the MCP URL → paste into ChatGPT Connectors
#
# Auto-configured (no user input): MCP_API_KEY, repo slug, branch, transport.

services:
  - type: web
    name: wiki-brain-mcp
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: WIKI_BRAIN_DIR
        value: /app/wiki
      - key: MCP_TRANSPORT
        value: streamable-http
      - key: PORT
        value: "8000"
      - key: MCP_API_KEY
        generateValue: true
      - key: GITHUB_TOKEN
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false
      - key: NOTION_PARENT_PAGE_ID
        sync: false
    healthCheckPath: /health
